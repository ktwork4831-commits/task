<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="今日やることに集中する、シンプルなタスク管理ページ">
  <link rel="stylesheet" href="styles.css?v=6">
  <title>今日のタスク</title>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand"><span class="brand-mark">◒</span><span>今日のタスク</span></div>
      <button class="text-button" id="resetButton" type="button">リセット</button>
    </header>

    <section class="date-nav" aria-label="今日の日付">
      <div><p class="date-kicker">TODAY</p><h1 id="todayLabel"></h1></div>
    </section>

    <section class="progress-card">
      <div class="progress-head"><span>今日の進捗</span><strong id="progressText">0%</strong></div>
      <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
      <div class="progress-foot"><span id="completedCount">0 / 0 完了</span><span id="remainingTime">残り 0分</span></div>
    </section>

    <section class="focus-card" aria-live="polite">
      <div class="focus-top"><span class="live-dot"></span><span>いま、これをやる</span><span class="focus-time" id="liveTimer">00:00</span></div>
      <h2 id="currentTitle">タスクを選んで始めよう</h2>
      <p id="currentMeta">ひとつずつ、目の前のことに集中</p>
      <button class="focus-action" id="currentAction" type="button" disabled>タスクを始める</button>
    </section>

    <section class="task-section">
      <div class="section-heading"><div><p class="section-kicker">SCHEDULE</p><h2>今日の予定</h2></div><span class="task-count" id="taskCount">0件</span></div>
      <div class="task-list" id="taskList"></div>
      <p class="empty-state" id="emptyState" hidden>まだ予定がありません。<br>下のボタンから追加しましょう。</p>
    </section>

    <section class="history-section">
      <div class="section-heading"><div><p class="section-kicker">RECORD</p><h2>実績記録</h2></div><span class="task-count" id="historyCount">0件</span></div>
      <div class="history-list" id="historyList"></div>
      <p class="empty-state compact" id="historyEmpty">完了したタスクの実績時間がここに残ります。</p>
    </section>

    <button class="add-fab" id="openAdd" type="button"><span>＋</span> タスクを追加</button>

    <dialog class="task-dialog" id="addDialog">
      <form method="dialog" id="addForm">
        <div class="dialog-head">
          <div><p class="dialog-kicker">NEW TASK</p><h2>タスクを追加</h2></div>
          <button class="close-button" type="button" data-close-dialog="addDialog" aria-label="閉じる">×</button>
        </div>
        <label class="field-label">タスク名
          <input id="taskTitle" required maxlength="60" placeholder="例：メールを確認する">
        </label>
        <label class="field-label add-start-field">開始時間
          <input id="taskTime" type="time" value="09:00">
        </label>
        <label class="field-label">予定時間
          <select id="taskDuration">
            <option value="15">15分</option>
            <option value="30" selected>30分</option>
            <option value="45">45分</option>
            <option value="60">1時間</option>
            <option value="90">1時間30分</option>
            <option value="120">2時間</option>
          </select>
        </label>
        <label class="check-label"><input id="taskRepeat" type="checkbox"><span>毎日の予定にする</span></label>
        <button class="save-button" value="default" type="submit">追加する</button>
      </form>
    </dialog>

    <dialog class="task-dialog" id="editDialog">
      <form method="dialog" id="editForm">
        <div class="dialog-head">
          <div><p class="dialog-kicker">EDIT TASK</p><h2>タスクを編集</h2></div>
          <button class="close-button" type="button" data-close-dialog="editDialog" aria-label="閉じる">×</button>
        </div>
        <label class="field-label">タスク名
          <input id="editTitle" required maxlength="60">
        </label>
        <label class="field-label">開始時間
          <input id="editTime" type="time">
        </label>
        <label class="field-label">予定時間（分）
          <input id="editDuration" type="number" min="1" inputmode="numeric">
        </label>
        <label class="check-label"><input id="editRepeat" type="checkbox"><span>毎日の予定にする</span></label>
        <button class="save-button" value="default" type="submit">変更を保存</button>
      </form>
    </dialog>

    <div class="undo-toast" id="undoToast" hidden><span id="undoText">削除しました</span><button id="undoButton" type="button">元に戻す</button></div>
  </main>
  <script src="app.js?v=6"></script>
</body>
</html>

<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="今日やることに集中する、シンプルなタスク管理ページ">
  <link rel="stylesheet" href="styles.css?v=12">
  <style>
    .add-start-field{width:152px!important;max-width:100%!important;margin-left:auto!important;margin-right:auto!important;text-align:center!important;overflow:visible!important}
    .add-start-field input[type="time"]{position:relative!important;display:block!important;width:100%!important;min-width:0!important;max-width:100%!important;height:46px!important;box-sizing:border-box!important;margin:5px 0 0!important;padding:0 12px!important;border:0!important;border-radius:10px!important;background:#fff!important;box-shadow:inset 0 0 0 1px var(--line)!important;color:var(--ink)!important;text-align:center!important;line-height:46px!important;font-variant-numeric:tabular-nums!important;-webkit-appearance:none!important;appearance:none!important}
    .add-start-field input[type="time"]::-webkit-date-and-time-value{display:flex!important;width:100%!important;height:46px!important;min-height:46px!important;margin:0!important;padding:0!important;align-items:center!important;justify-content:center!important;text-align:center!important}
    .add-start-field input[type="time"]::-webkit-datetime-edit{display:flex!important;width:100%!important;height:46px!important;padding:0!important;align-items:center!important;justify-content:center!important;text-align:center!important}
    .add-start-field input[type="time"]::-webkit-datetime-edit-fields-wrapper{display:flex!important;align-items:center!important;justify-content:center!important;padding:0!important}
    .add-start-field input[type="time"]::-webkit-calendar-picker-indicator{position:absolute!important;inset:0!important;width:100%!important;height:100%!important;margin:0!important;padding:0!important;opacity:0!important;cursor:pointer!important}
  </style>
  <title>今日のタスク</title>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand"><span class="brand-mark">◒</span><span>今日のタスク</span></div>
      <button class="text-button" id="resetButton" type="button">リセット</button>
    </header>

    <section class="date-nav" aria-label="今日の日付">
      <div><p class="date-kicker">TODAY</p><h1 id="todayLabel"></h1></div>
    </section>

    <section class="progress-card">
      <div class="progress-head"><span>今日の進捗</span><strong id="progressText">0%</strong></div>
      <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
      <div class="progress-foot"><span id="completedCount">0 / 0 完了</span><span id="remainingTime">残り 0分</span></div>
    </section>

    <div hidden aria-hidden="true">
      <span id="liveTimer"></span><h2 id="currentTitle"></h2><p id="currentMeta"></p><button id="currentAction" type="button"></button>
    </div>

    <article class="clock-card">
      <div class="clock-card-head">
        <div><span class="clock-kicker">DAILY PLAN</span><strong>24時間の予定</strong></div>
        <span id="clockItemCount">予定なし</span>
      </div>
      <div class="clock-layout">
        <div class="clock-visual">
          <svg class="review-clock" viewBox="0 0 260 260" role="img" aria-label="24時間の予定時計">
            <circle class="clock-face" cx="130" cy="130" r="92"></circle>
            <g id="clockTicks"></g>
            <g id="clockSegments"></g>
            <circle class="clock-center" cx="130" cy="130" r="58"></circle>
            <text class="clock-center-label" x="130" y="119" text-anchor="middle">予定合計</text>
            <text class="clock-center-value" id="clockCenterValue" x="130" y="145" text-anchor="middle">0分</text>
            <text class="clock-number" x="130" y="23" text-anchor="middle">0</text>
            <text class="clock-number" x="239" y="134" text-anchor="middle">6</text>
            <text class="clock-number" x="130" y="249" text-anchor="middle">12</text>
            <text class="clock-number" x="21" y="134" text-anchor="middle">18</text>
          </svg>
        </div>
        <div class="clock-legend" id="clockLegend"></div>
      </div>
      <p class="clock-note">開始時間と予定時間を、24時間の時計上に表示します。</p>
    </article>

    <section class="task-section">
      <div class="section-heading"><div><p class="section-kicker">SCHEDULE</p><h2>今日の予定</h2></div><span class="task-count" id="taskCount">0件</span></div>
      <div class="task-list" id="taskList"></div>
      <p class="empty-state" id="emptyState" hidden>まだ予定がありません。<br>下のボタンから追加しましょう。</p>
    </section>

    <section class="review-section">
      <div class="section-heading review-heading">
        <div><p class="section-kicker">REVIEW</p><h2>振り返り</h2></div>
        <span class="review-date" id="reviewDateLabel"></span>
      </div>
      <div class="review-tabs" role="tablist" aria-label="振り返る期間">
        <button type="button" data-review-period="yesterday" role="tab" class="active">昨日</button>
        <button type="button" data-review-period="today" role="tab">今日</button>
        <button type="button" data-review-period="week" role="tab">過去7日</button>
      </div>
      <div class="review-summary" id="reviewSummary">
        <article class="summary-card"><span>完了</span><strong id="reviewCount">0件</strong></article>
        <article class="summary-card"><span>実績時間</span><strong id="reviewActual">0分</strong></article>
        <article class="summary-card"><span>予定との差</span><strong id="reviewDifference">±0分</strong></article>
      </div>
      <div class="review-list" id="reviewList"></div>
      <p class="empty-state compact" id="reviewEmpty">この期間の実績記録はありません。</p>
    </section>

    <section class="history-section">
      <div class="section-heading">
        <div><p class="section-kicker">RECORD</p><h2>実績記録</h2></div>
        <div class="history-heading-actions">
          <span class="task-count" id="historyCount">0件</span>
          <button class="history-clear-button" id="clearHistoryButton" type="button" hidden>すべて削除</button>
        </div>
      </div>
      <div class="history-list" id="historyList"></div>
      <p class="empty-state compact" id="historyEmpty">完了したタスクの実績時間がここに残ります。</p>
    </section>

    <button class="add-fab" id="openAdd" type="button"><span>＋</span> タスクを追加</button>

    <dialog class="task-dialog" id="addDialog">
      <form method="dialog" id="addForm">
        <div class="dialog-head"><div><p class="dialog-kicker">NEW TASK</p><h2>タスクを追加</h2></div><button class="close-button" type="button" data-close-dialog="addDialog" aria-label="閉じる">×</button></div>
        <label class="field-label">タスク名<input id="taskTitle" required maxlength="60" placeholder="例：メールを確認する"></label>
        <label class="field-label add-start-field">開始時間<input id="taskTime" type="time" value="09:00"></label>
        <div class="duration-field">
          <label class="field-label">予定時間を選択
            <select id="taskDuration"><option value="15">15分</option><option value="30" selected>30分</option><option value="45">45分</option><option value="60">1時間</option><option value="90">1時間30分</option><option value="120">2時間</option></select>
          </label>
          <label class="field-label">分数を手入力
            <input id="taskDurationManual" type="number" min="1" max="1440" inputmode="numeric" value="30">
          </label>
        </div>
        <label class="check-label"><input id="taskRepeat" type="checkbox"><span>毎日の予定にする</span></label>
        <button class="save-button" value="default" type="submit">追加する</button>
      </form>
    </dialog>

    <dialog class="task-dialog" id="editDialog">
      <form method="dialog" id="editForm">
        <div class="dialog-head"><div><p class="dialog-kicker">EDIT TASK</p><h2>タスクを編集</h2></div><button class="close-button" type="button" data-close-dialog="editDialog" aria-label="閉じる">×</button></div>
        <label class="field-label">タスク名<input id="editTitle" required maxlength="60"></label>
        <label class="field-label add-start-field">開始時間<input id="editTime" type="time"></label>
        <div class="duration-field">
          <label class="field-label">予定時間を選択
            <select id="editDurationPreset"><option value="15">15分</option><option value="30">30分</option><option value="45">45分</option><option value="60">1時間</option><option value="90">1時間30分</option><option value="120">2時間</option><option value="custom">その他</option></select>
          </label>
          <label class="field-label">分数を手入力
            <input id="editDuration" type="number" min="1" max="1440" inputmode="numeric">
          </label>
        </div>
        <label class="check-label"><input id="editRepeat" type="checkbox"><span>毎日の予定にする</span></label>
        <button class="save-button" value="default" type="submit">変更を保存</button>
      </form>
    </dialog>

    <div class="undo-toast" id="undoToast" hidden><span id="undoText">削除しました</span><button id="undoButton" type="button">元に戻す</button></div>
  </main>
  <script src="app.js?v=11"></script>
  <script>
    renderClock = function () {
      renderClockTicks();
      const segmentTarget = $('clockSegments');
      const legendTarget = $('clockLegend');
      const center = $('clockCenterValue');
      const count = $('clockItemCount');
      if (!segmentTarget || !legendTarget || !center || !count) return;

      const plannedTasks = tasks();
      const totalPlanned = plannedTasks.reduce((sum, task) => sum + Number(task.planned || 0), 0);
      center.textContent = durationText(totalPlanned);
      count.textContent = plannedTasks.length ? `${plannedTasks.length}件の予定` : '予定なし';

      if (!plannedTasks.length) {
        segmentTarget.innerHTML = '';
        legendTarget.innerHTML = '<div class="clock-legend-meta">タスクを追加すると、予定した時間帯がここに表示されます。</div>';
        return;
      }

      const timeToMinutes = value => {
        const [hour, minute] = String(value || '00:00').split(':').map(Number);
        return Math.max(0, Math.min(1439, hour * 60 + minute));
      };
      const timeLabel = value => {
        const normalized = ((Math.round(value) % 1440) + 1440) % 1440;
        return `${String(Math.floor(normalized / 60)).padStart(2, '0')}:${String(normalized % 60).padStart(2, '0')}`;
      };
      const taskColor = index => `hsl(${Math.round((index * 137.508 + 8) % 360)} 58% 52%)`;
      const segment = (start, end, color) => {
        if (end <= 1440) return `<path class="clock-segment" stroke="${color}" d="${arcPath(start, Math.min(end, 1439.9))}"></path>`;
        return `<path class="clock-segment" stroke="${color}" d="${arcPath(start, 1439.9)}"></path><path class="clock-segment" stroke="${color}" d="${arcPath(0, end - 1440)}"></path>`;
      };

      segmentTarget.innerHTML = plannedTasks.map((task, index) => {
        const start = timeToMinutes(task.time);
        const end = start + Math.max(1, Number(task.planned || 0));
        return segment(start, end, taskColor(index));
      }).join('');

      legendTarget.innerHTML = plannedTasks.map((task, index) => {
        const start = timeToMinutes(task.time);
        const planned = Math.max(1, Number(task.planned || 0));
        const end = start + planned;
        const color = taskColor(index);
        return `<div class="clock-legend-item">
          <span class="clock-dot" style="background:${color}"></span>
          <div class="clock-legend-main"><div class="clock-legend-title">${escapeHtml(task.title)}</div><div class="clock-legend-meta">${timeLabel(start)}〜${timeLabel(end)}</div></div>
          <span class="clock-legend-time">${durationText(planned)}</span>
        </div>`;
      }).join('');
    };
    renderClock();

    const durationOptions = ['15', '30', '45', '60', '90', '120'];
    const syncDuration = (select, input) => {
      if (select.value !== 'custom') input.value = select.value;
    };

    $('taskDuration').addEventListener('change', () => syncDuration($('taskDuration'), $('taskDurationManual')));
    $('taskDurationManual').addEventListener('input', () => {
      if (durationOptions.includes($('taskDurationManual').value)) $('taskDuration').value = $('taskDurationManual').value;
    });
    $('editDurationPreset').addEventListener('change', () => syncDuration($('editDurationPreset'), $('editDuration')));
    $('editDuration').addEventListener('input', () => {
      $('editDurationPreset').value = durationOptions.includes($('editDuration').value) ? $('editDuration').value : 'custom';
    });

    const originalOpenEdit = openEdit;
    openEdit = function (task) {
      originalOpenEdit(task);
      const value = String(task.planned);
      $('editDurationPreset').value = durationOptions.includes(value) ? value : 'custom';
    };

    $('addForm').addEventListener('submit', event => {
      event.preventDefault();
      event.stopImmediatePropagation();
      const title = $('taskTitle').value.trim();
      const planned = Number($('taskDurationManual').value);
      if (!title || !Number.isFinite(planned) || planned <= 0) return;
      state.tasks.push(makeTask({ title, time: $('taskTime').value || '09:00', planned, repeat: $('taskRepeat').checked }));
      $('addDialog').close();
      event.target.reset();
      $('taskTime').value = '09:00';
      $('taskDuration').value = '30';
      $('taskDurationManual').value = '30';
      render();
    }, true);

    $('editForm').addEventListener('submit', event => {
      event.preventDefault();
      event.stopImmediatePropagation();
      const task = find(editingId);
      const title = $('editTitle').value.trim();
      const planned = Number($('editDuration').value);
      if (!task || !title || !Number.isFinite(planned) || planned <= 0) return;
      task.title = title;
      task.time = $('editTime').value || '09:00';
      task.planned = planned;
      task.repeat = $('editRepeat').checked;
      $('editDialog').close();
      editingId = null;
      render();
    }, true);
  </script>
</body>
</html>
